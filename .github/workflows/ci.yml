name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Backend validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Compose configurations
        run: make config

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install pinned uv
        run: python -m pip install --disable-pip-version-check uv==0.11.22

      - name: Sync locked dependencies
        working-directory: apps/backend
        run: uv sync --frozen

      - name: Lint
        run: make lint

      - name: Check migration drift
        run: make migration-check

      - name: Check Django configuration
        run: make django-check

      - name: Test
        run: make test
