# Publishes the single `kg-backend` image used by every client deployment
# (one image -> N deployments). ci.yml stays the quality gate; this only runs
# on a version tag or a manual dispatch, so a release is deliberate.
#
# Flow: build the prod target -> Trivy scan (fail on HIGH/CRITICAL) -> push to
# GHCR, private, tagged by semver + short git sha. Coolify then deploys by
# pulling a pinned tag/digest; it never builds.
#
# NOTE: actions below are pinned to major-version tags for readability. Before
# merging, pin them to full commit SHAs to match ci.yml's supply-chain policy.
name: Publish image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/kg-backend — owner resolves from the repo, no hardcoding.
  IMAGE_NAME: ${{ github.repository_owner }}/kg-backend

jobs:
  publish:
    name: Build, scan, push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Semver from the git tag, a short-sha tag for exact traceability, and
          # the manual dispatch input when triggered by hand.
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      # Build once and load locally so Trivy can gate BEFORE anything is pushed.
      - name: Build prod image (load for scan)
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          target: prod
          load: true
          tags: kg-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: kg-backend:scan
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      # Cache hit from the build above makes this a fast re-tag + push.
      - name: Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
