name: Senior Engineer Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

# Only one review per PR at a time
concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Senior Engineer Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD)
          DIFF_STAT=$(git diff origin/main...HEAD --stat)
          COMMITS=$(git log origin/main..HEAD --pretty=format:"%h %s" | head -20)

          # Save to files (avoids shell escaping issues)
          echo "$DIFF" > /tmp/pr_diff.txt
          echo "$DIFF_STAT" > /tmp/pr_diff_stat.txt
          echo "$COMMITS" > /tmp/pr_commits.txt

      - name: Build review prompt
        id: prompt
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          cat > /tmp/review_prompt.md << 'PROMPT_EOF'
          You are a senior engineer on a permission-safe AI knowledge graph system.
          Review the following pull request changes.

          Project rules (critical):
          - Stack: Django + DRF + Celery + Neo4j + SpiceDB + Redis + Postgres
          - Permission-safe retrieval is the core constraint — restricted facts must NEVER reach the LLM
          - Every graph node/relationship/chunk must have source provenance fields
          - SpiceDB is mandatory for authorization — no custom Postgres permission checks
          - DEBUG must default to False outside local dev
          - Never expose stack traces in API responses
          - Never log API keys, Drive content, or raw LLM prompts
          - Celery tasks must be idempotent and receive only primitive IDs
          - All secrets via environment variables only

          PROMPT_EOF

          {
            printf 'PR Title: %s\n' "$PR_TITLE"
            printf 'PR Author: %s\n' "$PR_AUTHOR"
            printf 'Base branch: main\n\n'
            printf 'Commits:\n'
            cat /tmp/pr_commits.txt
            printf '\n\nDiff stat:\n'
            cat /tmp/pr_diff_stat.txt
            printf '\nFull diff:\n```diff\n'
            head -c 50000 /tmp/pr_diff.txt
            printf '\n```\n'
            cat << 'FORMAT_EOF'

          Write your review using this exact format:

          ## Senior Engineer Review

          ### Summary
          (2-3 sentences: what does this PR do?)

          ### ✅ What's Good
          - (list good patterns, good tests, correct security decisions)

          ### ❌ Issues — Must Fix Before Merge
          - (file:line — bugs, security holes, permission leaks, missing provenance)

          ### ⚠️ Improvements — Should Fix
          - (code quality, test gaps, naming, missing validation)

          ### 💡 Suggestions — Nice To Have
          - (optional future improvements)

          ### Verdict
          One of: ✅ APPROVE | 🔄 APPROVE WITH NOTES | ❌ REQUEST CHANGES

          ### Agent Action Items
          (numbered list for the coding agent, ordered by priority)
          FORMAT_EOF
          } >> /tmp/review_prompt.md

      - name: Run review via OpenRouter
        id: review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            cat > /tmp/review_output.md << 'EOF'
          Automated AI review skipped: the repository does not have an
          `OPENROUTER_API_KEY` Actions secret. Deterministic CI remains the
          required merge gate.
          EOF
            exit 0
          fi

          PROMPT=$(cat /tmp/review_prompt.md)
          ESCAPED_PROMPT=$(echo "$PROMPT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "X-Title: Knowledge Graph Senior Review" \
            -d "{
              \"model\": \"anthropic/claude-sonnet-5\",
              \"messages\": [{\"role\": \"user\", \"content\": $ESCAPED_PROMPT}],
              \"max_tokens\": 4000
            }")

          REVIEW_TEXT=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'choices' in data and data['choices']:
              print(data['choices'][0]['message']['content'])
          else:
              print('Review generation failed. Raw response:')
              print(json.dumps(data, indent=2))
          ")

          echo "$REVIEW_TEXT" > /tmp/review_output.md
          echo "Review generated successfully"

      - name: Post review as PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('/tmp/review_output.md', 'utf8');

            const comment = `<!-- senior-engineer-review -->
            ## 🔍 Senior Engineer Review

            ${reviewText}

            ---
            *Automated review by the Senior Engineer agent. Address all ❌ items before merging.*
            `;

            // Delete previous review comment if exists
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('<!-- senior-engineer-review -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
