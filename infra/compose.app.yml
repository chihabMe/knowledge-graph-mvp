# Same defaults as compose.infrastructure.yml (anchors cannot cross files).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  django:
    build:
      context: ../apps/backend
      target: prod
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
    env_file:
      - ../.env
    # Google credentials stay outside the repo. Local ADC and legacy keys are
    # read-only; an attached Compute Engine service account needs no file.
    # The development OAuth token gets a dedicated writable directory.
    volumes:
      - ${GOOGLE_ADC_FILE:-/dev/null}:/run/secrets/google-application-default.json:ro
      - ${GOOGLE_SERVICE_ACCOUNT_FILE:-/dev/null}:/run/secrets/google-service-account.json:ro
      - ${GOOGLE_OAUTH_CLIENT_SECRET_FILE:-/dev/null}:/run/secrets/google-oauth-client.json:ro
      - ${GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE:-/dev/null}:/run/secrets/google-user-oauth-client.json:ro
      - ${GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE:-/dev/null}:/run/secrets/google-user-token-keyring.json:ro
      - ${GOOGLE_OAUTH_TOKEN_DIR:-/dev/null}:/run/secrets/google-oauth-token-store:rw
    environment:
      # Open WebUI reaches the compatible API through Compose DNS. Preserve
      # the operator's external host allowlist and add only that internal name.
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},django
      GOOGLE_DRIVE_AUTH_MODE: ${GOOGLE_DRIVE_AUTH_MODE:-application_default}
      # Empty means ADC may fall through to the Compute Engine metadata server.
      # Local development sets this to the read-only mount above.
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_ADC_CONTAINER_FILE:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-oauth-client.json
      GOOGLE_OAUTH_TOKEN_FILE: /run/secrets/google-oauth-token-store/google-oauth-token.json
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
      # Explicit interpolation lets an operator rotate or smoke-test these
      # values without writing credentials into the Compose files. The same
      # two values are supplied independently to Open WebUI.
      OPEN_WEBUI_COMPATIBLE_API_ENABLED: ${OPEN_WEBUI_COMPATIBLE_API_ENABLED:-false}
      OPEN_WEBUI_BACKEND_API_KEY: ${OPEN_WEBUI_BACKEND_API_KEY:-}
      OPEN_WEBUI_IDENTITY_JWT_SECRET: ${OPEN_WEBUI_IDENTITY_JWT_SECRET:-}
      OPEN_WEBUI_IDENTITY_JWT_HEADER: ${OPEN_WEBUI_IDENTITY_JWT_HEADER:-X-OpenWebUI-User-Jwt}
      OPEN_WEBUI_IDENTITY_JWT_ISSUER: ${OPEN_WEBUI_IDENTITY_JWT_ISSUER:-open-webui}
      OPEN_WEBUI_IDENTITY_JWT_MAX_LIFETIME_SECONDS: ${OPEN_WEBUI_IDENTITY_JWT_MAX_LIFETIME_SECONDS:-300}
      OPEN_WEBUI_IDENTITY_JWT_CLOCK_SKEW_SECONDS: ${OPEN_WEBUI_IDENTITY_JWT_CLOCK_SKEW_SECONDS:-10}
      OPEN_WEBUI_MODEL_ID: ${OPEN_WEBUI_MODEL_ID:-client-knowledge-graph}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-}
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - ${DJANGO_GUNICORN_WORKERS:-2}
      - --timeout
      - "120"
      # Recycle workers periodically (with jitter so they never restart in
      # unison) — cheap insurance against slow memory leaks in long-running
      # single-tenant deployments.
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      spicedb:
        condition: service_healthy
      spicedb-schema:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=10)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - kg-public
      - kg-private
      - kg-egress
    labels:
      - traefik.enable=true
      - traefik.http.routers.django.rule=Host(`${DJANGO_HOST:-api.localhost}`)
      - traefik.http.routers.django.entrypoints=web
      - traefik.http.services.django.loadbalancer.server.port=8000

  celery-worker:
    build:
      context: ../apps/backend
      target: prod
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          # LLM extraction fans out per chunk; the worker is the hungriest
          # app process.
          memory: 1536M
    env_file:
      - ../.env
    # The Drive sync task runs here, so the worker needs the same credential
    # sources and the dedicated writable OAuth-token directory.
    volumes:
      - ${GOOGLE_ADC_FILE:-/dev/null}:/run/secrets/google-application-default.json:ro
      - ${GOOGLE_SERVICE_ACCOUNT_FILE:-/dev/null}:/run/secrets/google-service-account.json:ro
      - ${GOOGLE_OAUTH_CLIENT_SECRET_FILE:-/dev/null}:/run/secrets/google-oauth-client.json:ro
      - ${GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE:-/dev/null}:/run/secrets/google-user-oauth-client.json:ro
      - ${GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE:-/dev/null}:/run/secrets/google-user-token-keyring.json:ro
      - ${GOOGLE_OAUTH_TOKEN_DIR:-/dev/null}:/run/secrets/google-oauth-token-store:rw
    environment:
      GOOGLE_DRIVE_AUTH_MODE: ${GOOGLE_DRIVE_AUTH_MODE:-application_default}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_ADC_CONTAINER_FILE:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-oauth-client.json
      GOOGLE_OAUTH_TOKEN_FILE: /run/secrets/google-oauth-token-store/google-oauth-token.json
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
    command:
      - celery
      - -A
      - config
      - worker
      - --loglevel=INFO
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME --timeout 10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - kg-private
      - kg-egress

  spicedb-schema:
    build:
      context: ../apps/backend
      target: prod
    restart: "no"
    logging: *default-logging
    env_file:
      - ../.env
    volumes:
      - ${GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE:-/dev/null}:/run/secrets/google-user-oauth-client.json:ro
      - ${GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE:-/dev/null}:/run/secrets/google-user-token-keyring.json:ro
    environment:
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
    command:
      - python
      - manage.py
      - spicedb_schema_apply
    depends_on:
      spicedb:
        condition: service_healthy
    networks:
      - kg-private

  celery-beat:
    build:
      context: ../apps/backend
      target: prod
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    env_file:
      - ../.env
    volumes:
      - ${GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE:-/dev/null}:/run/secrets/google-user-oauth-client.json:ro
      - ${GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE:-/dev/null}:/run/secrets/google-user-token-keyring.json:ro
    environment:
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
    command:
      - celery
      - -A
      - config
      - beat
      - --loglevel=INFO
      # /app is root-owned read-only in the prod image; the schedule file is
      # derived state (rebuilt from CELERY_BEAT_SCHEDULE), so /tmp is fine.
      - --schedule=/tmp/celerybeat-schedule
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    profiles:
      - scheduler
    networks:
      - kg-private
      - kg-egress

networks:
  kg-public:
    name: kg-public
  kg-private:
    name: kg-private
  kg-egress:
    name: kg-egress
