# Same defaults as compose.infrastructure.yml (anchors cannot cross files).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  django:
    build:
      context: ../apps/backend
      target: prod
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
    env_file:
      - ../.env
    # The Google service-account key stays outside the repo on the host and
    # is mounted read-only; the container-side path overrides the host path
    # from .env. /dev/null keeps the stack bootable before the key exists.
    volumes:
      - ${GOOGLE_SERVICE_ACCOUNT_FILE:-/dev/null}:/run/secrets/google-service-account.json:ro
    environment:
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - ${DJANGO_GUNICORN_WORKERS:-2}
      - --timeout
      - "120"
      # Recycle workers periodically (with jitter so they never restart in
      # unison) — cheap insurance against slow memory leaks in long-running
      # single-tenant deployments.
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      spicedb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=10)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - kg-public
      - kg-private
      - kg-egress
    labels:
      - traefik.enable=true
      - traefik.http.routers.django.rule=Host(`${DJANGO_HOST:-api.localhost}`)
      - traefik.http.routers.django.entrypoints=web
      - traefik.http.services.django.loadbalancer.server.port=8000

  celery-worker:
    build:
      context: ../apps/backend
      target: prod
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          # LLM extraction fans out per chunk; the worker is the hungriest
          # app process.
          memory: 1536M
    env_file:
      - ../.env
    # The Drive sync task runs here, so the worker needs the same read-only
    # key mount as the web container.
    volumes:
      - ${GOOGLE_SERVICE_ACCOUNT_FILE:-/dev/null}:/run/secrets/google-service-account.json:ro
    environment:
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
    command:
      - celery
      - -A
      - config
      - worker
      - --loglevel=INFO
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME --timeout 10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - kg-private
      - kg-egress

  celery-beat:
    build:
      context: ../apps/backend
      target: prod
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    env_file:
      - ../.env
    command:
      - celery
      - -A
      - config
      - beat
      - --loglevel=INFO
      # /app is root-owned read-only in the prod image; the schedule file is
      # derived state (rebuilt from CELERY_BEAT_SCHEDULE), so /tmp is fine.
      - --schedule=/tmp/celerybeat-schedule
    depends_on:
      django:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    profiles:
      - scheduler
    networks:
      - kg-private
      - kg-egress

networks:
  kg-public:
    name: kg-public
  kg-private:
    name: kg-private
  kg-egress:
    name: kg-egress
