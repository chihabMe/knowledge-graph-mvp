services:
  django:
    build:
      context: ../apps/backend
    restart: unless-stopped
    env_file:
      - ../.env
    # The Google service-account key stays outside the repo on the host and
    # is mounted read-only; the container-side path overrides the host path
    # from .env. /dev/null keeps the stack bootable before the key exists.
    volumes:
      - ${GOOGLE_SERVICE_ACCOUNT_FILE:-/dev/null}:/run/secrets/google-service-account.json:ro
    environment:
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - ${DJANGO_GUNICORN_WORKERS:-2}
      - --timeout
      - "120"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      spicedb:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=10)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - kg-public
      - kg-private
      - kg-egress
    labels:
      - traefik.enable=true
      - traefik.http.routers.django.rule=Host(`${DJANGO_HOST:-api.localhost}`)
      - traefik.http.routers.django.entrypoints=web
      - traefik.http.services.django.loadbalancer.server.port=8000

  celery-worker:
    build:
      context: ../apps/backend
    restart: unless-stopped
    env_file:
      - ../.env
    # The Drive sync task runs here, so the worker needs the same read-only
    # key mount as the web container.
    volumes:
      - ${GOOGLE_SERVICE_ACCOUNT_FILE:-/dev/null}:/run/secrets/google-service-account.json:ro
    environment:
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
    command:
      - celery
      - -A
      - config
      - worker
      - --loglevel=INFO
    depends_on:
      django:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
    networks:
      - kg-private
      - kg-egress

  celery-beat:
    build:
      context: ../apps/backend
    restart: unless-stopped
    env_file:
      - ../.env
    command:
      - celery
      - -A
      - config
      - beat
      - --loglevel=INFO
    depends_on:
      django:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
    profiles:
      - scheduler
    networks:
      - kg-private
      - kg-egress

networks:
  kg-public:
    name: kg-public
  kg-private:
    name: kg-private
  kg-egress:
    name: kg-egress
