# Single Coolify-deployable compose for ONE client stack.
#
# Differences from the local dev/prod compose (deliberate, for Coolify):
#   - No Traefik / Dozzle: Coolify's proxy terminates TLS and routes the two
#     domains (set them in Coolify: open-webui -> client.<domain>, django ->
#     api.client.<domain>).
#   - No host ports: Coolify routes internally, so many client stacks coexist.
#   - App services run the PUBLISHED image — set KG_IMAGE in Coolify env, e.g.
#     KG_IMAGE=ghcr.io/chihabMe/kg-backend:0.1.0
#   - All secrets/config come from Coolify Environment Variables (from the
#     generated clients/<slug>/<slug>.env).
#   - The two OAuth/keyring files are created from Coolify secret environment
#     variables. Drive ingestion is keyless: ADC uses the dedicated service
#     account attached to the GCE VM, so no service-account JSON is mounted.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-secrets: &app-secrets
  - source: google-user-oauth-client
    target: google-user-oauth-client.json
  - source: google-user-token-keyring
    target: google-user-token-keyring.json

x-app-env: &app-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_DEBUG: ${DJANGO_DEBUG}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
  DJANGO_HOST: ${DJANGO_HOST}
  DJANGO_GUNICORN_WORKERS: ${DJANGO_GUNICORN_WORKERS}
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL}
  DJANGO_DB_CONN_MAX_AGE: ${DJANGO_DB_CONN_MAX_AGE}
  # The Coolify deployment omits the app-owned Traefik and Dozzle services.
  # Django still checks this legacy production guard at image startup, so use
  # an explicit non-credential marker rather than carrying the local default.
  TRAEFIK_OPS_BASIC_AUTH_USERS: disabled-by-coolify
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL}
  OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL}
  OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME}
  OPENROUTER_REQUEST_TIMEOUT_SECONDS: ${OPENROUTER_REQUEST_TIMEOUT_SECONDS}
  DRIVE_ROOTS_THROTTLE_RATE: ${DRIVE_ROOTS_THROTTLE_RATE}
  DRIVE_SYNC_THROTTLE_RATE: ${DRIVE_SYNC_THROTTLE_RATE}
  # Django also joins Coolify's shared proxy network, whose control-plane
  # containers expose generic aliases such as postgres and redis. Use unique
  # aliases on kg-private so application traffic cannot resolve to Coolify's
  # own database/cache by accident.
  DATABASE_URL: postgres://${POSTGRES_USER:-kg_user}:${POSTGRES_PASSWORD}@kg-postgres:5432/${POSTGRES_DB:-knowledge_graph}
  REDIS_URL: redis://kg-redis:6379/0
  DJANGO_CACHE_URL: redis://kg-redis:6379/2
  CELERY_BROKER_URL: redis://kg-redis:6379/0
  CELERY_RESULT_BACKEND: redis://kg-redis:6379/0
  # Keep NEO4J_* application variables container-local. Coolify injects each
  # discovered interpolation variable into every service, while the official
  # Neo4j image treats every NEO4J_* variable as server configuration.
  NEO4J_URI: bolt://kg-neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${KG_NEO4J_PASSWORD}
  SPICEDB_GRPC_PRESHARED_KEY: ${SPICEDB_GRPC_PRESHARED_KEY}
  SPICEDB_GRPC_URL: kg-spicedb:50051
  SPICEDB_GRPC_TLS: ${SPICEDB_GRPC_TLS}
  # SpiceDB is reachable only on kg-private; TLS terminates at Coolify's public
  # proxy and no SpiceDB port is published. Acknowledge that deliberate hop.
  SPICEDB_GRPC_ALLOW_INSECURE: "true"
  SPICEDB_REQUEST_TIMEOUT_SECONDS: ${SPICEDB_REQUEST_TIMEOUT_SECONDS}
  SPICEDB_BATCH_SIZE: ${SPICEDB_BATCH_SIZE}
  PERMISSION_SYNC_THROTTLE_RATE: ${PERMISSION_SYNC_THROTTLE_RATE}
  QUERY_THROTTLE_RATE: ${QUERY_THROTTLE_RATE}
  DRIVE_CONTENT_SYNC_INTERVAL_SECONDS: ${DRIVE_CONTENT_SYNC_INTERVAL_SECONDS}
  DRIVE_CONTENT_SYNC_MAX_AGE_SECONDS: ${DRIVE_CONTENT_SYNC_MAX_AGE_SECONDS}
  PERMISSION_SYNC_INTERVAL_SECONDS: ${PERMISSION_SYNC_INTERVAL_SECONDS}
  PERMISSION_VERIFICATION_MAX_AGE_SECONDS: ${PERMISSION_VERIFICATION_MAX_AGE_SECONDS}
  PERMISSION_SYNC_STALE_RUN_TIMEOUT_MINUTES: ${PERMISSION_SYNC_STALE_RUN_TIMEOUT_MINUTES}
  OPEN_WEBUI_PORT: ${OPEN_WEBUI_PORT}
  OPEN_WEBUI_HOST: ${OPEN_WEBUI_HOST}
  WEBUI_URL: ${WEBUI_URL}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
  GOOGLE_SESSION_OAUTH_ENABLED: ${GOOGLE_SESSION_OAUTH_ENABLED}
  GOOGLE_SESSION_OAUTH_REDIRECT_URI: ${GOOGLE_SESSION_OAUTH_REDIRECT_URI}
  GOOGLE_SESSION_OAUTH_STATE_MAX_AGE_SECONDS: ${GOOGLE_SESSION_OAUTH_STATE_MAX_AGE_SECONDS}
  GOOGLE_SESSION_START_THROTTLE_RATE: ${GOOGLE_SESSION_START_THROTTLE_RATE}
  GOOGLE_SESSION_CALLBACK_THROTTLE_RATE: ${GOOGLE_SESSION_CALLBACK_THROTTLE_RATE}
  OPEN_WEBUI_COMPATIBLE_API_ENABLED: ${OPEN_WEBUI_COMPATIBLE_API_ENABLED}
  OPEN_WEBUI_BACKEND_API_KEY: ${OPEN_WEBUI_BACKEND_API_KEY}
  OPEN_WEBUI_IDENTITY_JWT_SECRET: ${OPEN_WEBUI_IDENTITY_JWT_SECRET}
  OPEN_WEBUI_IDENTITY_JWT_HEADER: ${OPEN_WEBUI_IDENTITY_JWT_HEADER}
  OPEN_WEBUI_IDENTITY_JWT_ISSUER: ${OPEN_WEBUI_IDENTITY_JWT_ISSUER}
  OPEN_WEBUI_IDENTITY_JWT_MAX_LIFETIME_SECONDS: ${OPEN_WEBUI_IDENTITY_JWT_MAX_LIFETIME_SECONDS}
  OPEN_WEBUI_IDENTITY_JWT_CLOCK_SKEW_SECONDS: ${OPEN_WEBUI_IDENTITY_JWT_CLOCK_SKEW_SECONDS}
  OPEN_WEBUI_MODEL_ID: ${OPEN_WEBUI_MODEL_ID}
  OPEN_WEBUI_BYPASS_MODEL_ACCESS_CONTROL: ${OPEN_WEBUI_BYPASS_MODEL_ACCESS_CONTROL}
  OPEN_WEBUI_MODELS_THROTTLE_RATE: ${OPEN_WEBUI_MODELS_THROTTLE_RATE}
  OPEN_WEBUI_CHAT_THROTTLE_RATE: ${OPEN_WEBUI_CHAT_THROTTLE_RATE}
  OPEN_WEBUI_ENABLE_LOGIN_FORM: ${OPEN_WEBUI_ENABLE_LOGIN_FORM}
  OPEN_WEBUI_ENABLE_PASSWORD_AUTH: ${OPEN_WEBUI_ENABLE_PASSWORD_AUTH}
  OPEN_WEBUI_ENABLE_PASSWORD_CHANGE_FORM: ${OPEN_WEBUI_ENABLE_PASSWORD_CHANGE_FORM}
  GOOGLE_WORKSPACE_DOMAIN: ${GOOGLE_WORKSPACE_DOMAIN}
  GOOGLE_DRIVE_AUTH_MODE: ${GOOGLE_DRIVE_AUTH_MODE}
  GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
  GOOGLE_INGESTION_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_INGESTION_SERVICE_ACCOUNT_EMAIL}
  GOOGLE_OAUTH_TOKEN_DIR: ${GOOGLE_OAUTH_TOKEN_DIR}
  GOOGLE_PERMISSION_AUTHORITY: ${GOOGLE_PERMISSION_AUTHORITY}
  GOOGLE_USER_OAUTH_CLIENT_ID: ${GOOGLE_USER_OAUTH_CLIENT_ID}
  GOOGLE_USER_OAUTH_REDIRECT_URI: ${GOOGLE_USER_OAUTH_REDIRECT_URI}
  GOOGLE_USER_OAUTH_ALLOWED_DOMAIN: ${GOOGLE_USER_OAUTH_ALLOWED_DOMAIN}
  GOOGLE_USER_VISIBILITY_SYNC_INTERVAL_SECONDS: ${GOOGLE_USER_VISIBILITY_SYNC_INTERVAL_SECONDS}
  GOOGLE_USER_VISIBILITY_MAX_AGE_SECONDS: ${GOOGLE_USER_VISIBILITY_MAX_AGE_SECONDS}
  GOOGLE_USER_VISIBILITY_MAX_USERS: ${GOOGLE_USER_VISIBILITY_MAX_USERS}
  GOOGLE_USER_VISIBILITY_MAX_DOCUMENTS: ${GOOGLE_USER_VISIBILITY_MAX_DOCUMENTS}
  GOOGLE_USER_VISIBILITY_BATCH_SIZE: ${GOOGLE_USER_VISIBILITY_BATCH_SIZE}
  GOOGLE_USER_VISIBILITY_STALE_RUN_TIMEOUT_MINUTES: ${GOOGLE_USER_VISIBILITY_STALE_RUN_TIMEOUT_MINUTES}
  FRESHNESS_MONITOR_INTERVAL_SECONDS: ${FRESHNESS_MONITOR_INTERVAL_SECONDS}
  FRESHNESS_WARN_REMAINING_FRACTION: ${FRESHNESS_WARN_REMAINING_FRACTION}
  FRESHNESS_HEARTBEAT_MAX_AGE_SECONDS: ${FRESHNESS_HEARTBEAT_MAX_AGE_SECONDS}
  FRESHNESS_MONITOR_BEARER_KEY: ${FRESHNESS_MONITOR_BEARER_KEY}
  FRESHNESS_RUN_SAMPLE_LIMIT: ${FRESHNESS_RUN_SAMPLE_LIMIT}
  SYNC_RUN_RETENTION_DAYS: ${SYNC_RUN_RETENTION_DAYS}
  GOOGLE_USER_OAUTH_STATE_MAX_AGE_SECONDS: ${GOOGLE_USER_OAUTH_STATE_MAX_AGE_SECONDS}
  DRIVE_OAUTH_START_THROTTLE_RATE: ${DRIVE_OAUTH_START_THROTTLE_RATE}
  DRIVE_OAUTH_CALLBACK_THROTTLE_RATE: ${DRIVE_OAUTH_CALLBACK_THROTTLE_RATE}
  DRIVE_OAUTH_STATUS_THROTTLE_RATE: ${DRIVE_OAUTH_STATUS_THROTTLE_RATE}
  DRIVE_OAUTH_DISCONNECT_THROTTLE_RATE: ${DRIVE_OAUTH_DISCONNECT_THROTTLE_RATE}
  DRIVE_VISIBILITY_SYNC_THROTTLE_RATE: ${DRIVE_VISIBILITY_SYNC_THROTTLE_RATE}
  GOOGLE_DRIVE_SCOPE_TYPE: ${GOOGLE_DRIVE_SCOPE_TYPE}
  GOOGLE_DRIVE_ROOT_ID: ${GOOGLE_DRIVE_ROOT_ID}
  GOOGLE_SHARED_DRIVE_ID: ${GOOGLE_SHARED_DRIVE_ID}
  GRAPH_EXTRACTION_ENGINE: ${GRAPH_EXTRACTION_ENGINE}
  GRAPH_EXTRACTION_MODEL: ${GRAPH_EXTRACTION_MODEL}
  GRAPH_EXTRACTION_FALLBACK_MODELS: ${GRAPH_EXTRACTION_FALLBACK_MODELS}
  GRAPH_EXTRACTION_CHUNK_MAX_CHARS: ${GRAPH_EXTRACTION_CHUNK_MAX_CHARS}
  GRAPH_EXTRACTION_CHUNK_OVERLAP_CHARS: ${GRAPH_EXTRACTION_CHUNK_OVERLAP_CHARS}
  GRAPH_EXTRACTION_MAX_CONCURRENT_LLM_CALLS: ${GRAPH_EXTRACTION_MAX_CONCURRENT_LLM_CALLS}
  GRAPH_EXTRACTION_STALE_RUNNING_TIMEOUT_MINUTES: ${GRAPH_EXTRACTION_STALE_RUNNING_TIMEOUT_MINUTES}
  GRAPH_EXTRACTION_MAX_SYNC_ATTEMPTS: ${GRAPH_EXTRACTION_MAX_SYNC_ATTEMPTS}
  GRAPH_EXTRACTION_PENDING_REQUEUE_AFTER_MINUTES: ${GRAPH_EXTRACTION_PENDING_REQUEUE_AFTER_MINUTES}
  GRAPH_CHUNK_VECTOR_INDEX_NAME: ${GRAPH_CHUNK_VECTOR_INDEX_NAME}
  GRAPH_CHUNK_EMBEDDING_DIMENSIONS: ${GRAPH_CHUNK_EMBEDDING_DIMENSIONS}
  GRAPH_CHUNK_VECTOR_SIMILARITY: ${GRAPH_CHUNK_VECTOR_SIMILARITY}
  GRAPH_EMBEDDING_PROVIDER: ${GRAPH_EMBEDDING_PROVIDER}
  OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}
  GRAPH_EMBEDDING_BATCH_SIZE: ${GRAPH_EMBEDDING_BATCH_SIZE}
  QUERY_ANSWER_PROVIDER: ${QUERY_ANSWER_PROVIDER}
  QUERY_CONTEXT_MAX_CHARS: ${QUERY_CONTEXT_MAX_CHARS}
  QUERY_ANSWER_MAX_TOKENS: ${QUERY_ANSWER_MAX_TOKENS}
  QUERY_RETRIEVAL_LIMIT: ${QUERY_RETRIEVAL_LIMIT}
  QUERY_VECTOR_MIN_SCORE: ${QUERY_VECTOR_MIN_SCORE}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_graph}
      POSTGRES_USER: ${POSTGRES_USER:-kg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      kg-private:
        aliases: [kg-postgres]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data
    networks:
      kg-private:
        aliases: [kg-redis]

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    logging: *default-logging
    environment:
      NEO4J_AUTH: neo4j/${KG_NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: ${KG_NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${KG_NEO4J_HEAP_MAX:-1G}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      kg-private:
        aliases: [kg-neo4j]

  spicedb-migrate:
    image: ghcr.io/authzed/spicedb:v1.51.1
    restart: "no"
    logging: *default-logging
    command: ["--skip-release-check", "datastore", "migrate", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: postgres://${POSTGRES_USER:-kg_user}:${POSTGRES_PASSWORD}@kg-postgres:5432/${POSTGRES_DB:-knowledge_graph}?sslmode=disable
    networks: [kg-private]

  spicedb:
    image: ghcr.io/authzed/spicedb:v1.51.1
    restart: unless-stopped
    logging: *default-logging
    command: ["--skip-release-check", "serve"]
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${SPICEDB_GRPC_PRESHARED_KEY}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: postgres://${POSTGRES_USER:-kg_user}:${POSTGRES_PASSWORD}@kg-postgres:5432/${POSTGRES_DB:-knowledge_graph}?sslmode=disable
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      kg-private:
        aliases: [kg-spicedb]

  # One-shot init: apply the SpiceDB schema, then exit.
  spicedb-schema:
    image: ${KG_IMAGE}
    restart: "no"
    logging: *default-logging
    command: ["python", "manage.py", "spicedb_schema_apply"]
    depends_on:
      spicedb:
        condition: service_healthy
    environment:
      <<: *app-env
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
    secrets: *app-secrets
    networks: [kg-private]

  # One-shot init: apply Django migrations, then exit.
  django-migrate:
    image: ${KG_IMAGE}
    restart: "no"
    logging: *default-logging
    command: ["python", "manage.py", "migrate", "--noinput"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
    secrets: *app-secrets
    networks: [kg-private]

  django:
    image: ${KG_IMAGE}
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *app-env
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},django
      GOOGLE_DRIVE_AUTH_MODE: ${GOOGLE_DRIVE_AUTH_MODE:-application_default}
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-oauth-client.json
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
    secrets: *app-secrets
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - ${DJANGO_GUNICORN_WORKERS:-2}
      - --timeout
      - "120"
      - --max-requests
      - "1000"
      - --max-requests-jitter
      - "100"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      spicedb: { condition: service_healthy }
      spicedb-schema: { condition: service_completed_successfully }
      django-migrate: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; request = urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'Host': 'django', 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(request, timeout=10)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Coolify: assign api.<client>.<domain> to this service, container port 8000.
    expose: ["8000"]
    labels:
      traefik.docker.network: coolify
    networks:
      kg-private:
        aliases: [kg-django]
      coolify-proxy:

  celery-worker:
    image: ${KG_IMAGE}
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *app-env
      GOOGLE_DRIVE_AUTH_MODE: ${GOOGLE_DRIVE_AUTH_MODE:-application_default}
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-oauth-client.json
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
    secrets: *app-secrets
    command: ["celery", "-A", "config", "worker", "--loglevel=INFO"]
    depends_on:
      django: { condition: service_healthy }
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks: [kg-private]

  celery-beat:
    image: ${KG_IMAGE}
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *app-env
      GOOGLE_USER_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google-user-oauth-client.json
      GOOGLE_USER_TOKEN_ENCRYPTION_KEY_FILE: /run/secrets/google-user-token-keyring.json
    secrets: *app-secrets
    command: ["celery", "-A", "config", "beat", "--loglevel=INFO", "--schedule=/tmp/celerybeat-schedule"]
    depends_on:
      django: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [kg-private]

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.10.2
    restart: unless-stopped
    logging: *default-logging
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_PERSISTENT_CONFIG: "false"
      ENABLE_OAUTH_PERSISTENT_CONFIG: "false"
      WEBUI_URL: ${WEBUI_URL}
      CORS_ALLOW_ORIGIN: ${WEBUI_URL}
      SAFE_MODE: "true"
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"
      # Open WebUI 0.10.2 applies its TLS client configuration even to an
      # internal plain-HTTP URL. Route through Coolify's public HTTPS endpoint.
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL}
      OPENAI_API_KEY: ${OPEN_WEBUI_BACKEND_API_KEY}
      OPENAI_API_CONFIGS: '{"0":{"enable":true,"model_ids":["${OPEN_WEBUI_MODEL_ID:-client-knowledge-graph}"]}}'
      DEFAULT_MODELS: ${OPEN_WEBUI_MODEL_ID:-client-knowledge-graph}
      DEFAULT_PINNED_MODELS: ${OPEN_WEBUI_MODEL_ID:-client-knowledge-graph}
      ENABLE_EVALUATION_ARENA_MODELS: "false"
      BYPASS_MODEL_ACCESS_CONTROL: ${OPEN_WEBUI_BYPASS_MODEL_ACCESS_CONTROL:-true}
      ENABLE_DIRECT_CONNECTIONS: "false"
      ENABLE_OPENAI_API_PASSTHROUGH: "false"
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
      FORWARD_USER_INFO_HEADER_JWT_SECRET: ${OPEN_WEBUI_IDENTITY_JWT_SECRET}
      FORWARD_USER_INFO_HEADER_JWT: ${OPEN_WEBUI_IDENTITY_JWT_HEADER:-X-OpenWebUI-User-Jwt}
      FORWARD_USER_INFO_HEADER_JWT_EXPIRES_SECONDS: ${OPEN_WEBUI_IDENTITY_JWT_MAX_LIFETIME_SECONDS:-300}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      OPENID_PROVIDER_URL: https://accounts.google.com/.well-known/openid-configuration
      ENABLE_OAUTH_SIGNUP: "true"
      OAUTH_ALLOWED_DOMAINS: ${GOOGLE_USER_OAUTH_ALLOWED_DOMAIN:-example.com}
      ENABLE_OAUTH_ID_TOKEN_COOKIE: "false"
      OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "false"
      ENABLE_PROFILE_IMAGE_URL_FORWARDING: "false"
      ENABLE_SIGNUP: "false"
      ENABLE_LOGIN_FORM: ${OPEN_WEBUI_ENABLE_LOGIN_FORM:-false}
      ENABLE_PASSWORD_AUTH: ${OPEN_WEBUI_ENABLE_PASSWORD_AUTH:-false}
      ENABLE_PASSWORD_CHANGE_FORM: ${OPEN_WEBUI_ENABLE_PASSWORD_CHANGE_FORM:-false}
      ENABLE_TITLE_GENERATION: "false"
      ENABLE_FOLLOW_UP_GENERATION: "false"
      ENABLE_TAGS_GENERATION: "false"
      ENABLE_AUTOCOMPLETE_GENERATION: "false"
      ENABLE_SEARCH_QUERY_GENERATION: "false"
      RAG_EMBEDDING_ENGINE: openai
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
      BYPASS_EMBEDDING_AND_RETRIEVAL: "true"
      ENABLE_RAG_LOCAL_WEB_FETCH: "false"
      USER_PERMISSIONS_CHAT_CONTROLS: "false"
      USER_PERMISSIONS_CHAT_FILE_UPLOAD: "false"
      USER_PERMISSIONS_FEATURES_WEB_SEARCH: "false"
      USER_PERMISSIONS_FEATURES_CODE_INTERPRETER: "false"
    depends_on:
      django: { condition: service_healthy }
    volumes:
      - open-webui-data:/app/backend/data
    # Coolify: assign client.<domain> to this service, container port 8080.
    expose: ["8080"]
    labels:
      traefik.docker.network: coolify
    networks: [kg-private, coolify-proxy]

networks:
  coolify-proxy:
    external: true
    name: coolify
  kg-private:
    internal: true

secrets:
  google-user-oauth-client:
    environment: KG_GOOGLE_USER_OAUTH_CLIENT_JSON
  google-user-token-keyring:
    environment: KG_GOOGLE_USER_TOKEN_KEYRING_JSON

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  open-webui-data:
