# Development overlay — never used alone, always layered on the base files:
#   make up      → core services only (postgres, redis, neo4j, spicedb,
#                   django, celery-worker), no traefik/dozzle/open-webui.
#   make up-dev  → core services + celery-beat + open-webui, still no
#                   traefik/dozzle (this project's traefik is only meant
#                   for a real single-customer VM, not a shared dev box).
#   make up-all  → everything, including this project's own traefik/dozzle.
#
# It swaps the app containers onto the Dockerfile's `dev` target and
# bind-mounts the source packages for hot reload. Individual packages are
# mounted (not the whole backend directory) so the image's /app/.venv is
# never shadowed by the host checkout.
x-dev-source: &dev-source
  - ../apps/backend/authorization:/app/authorization
  - ../apps/backend/config:/app/config
  - ../apps/backend/core:/app/core
  - ../apps/backend/graph:/app/graph
  - ../apps/backend/health:/app/health
  - ../apps/backend/integrations:/app/integrations
  - ../apps/backend/retrieval:/app/retrieval
  - ../apps/backend/manage.py:/app/manage.py
  # Read-only so `make demo-eval` (run_evaluation) can reach the demo
  # evaluation fixture from inside the container; nothing here writes to it.
  - ../data/eval:/data/eval:ro

services:
  django:
    build:
      context: ../apps/backend
      target: dev
    # Development OAuth tokens stay mode 0600 on the host. Running with the
    # host uid/gid lets Django refresh that bind-mounted token without making
    # it group- or world-readable. Production keeps the image's django user.
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      # The dev overlay is the one explicit place allowed to relax production
      # startup checks (weak local secret, HTTPS redirect, secure cookies).
      DJANGO_DEBUG: "true"
    # runserver autoreloads on every source change — no rebuild needed.
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes: *dev-source
    ports:
      - "127.0.0.1:${DJANGO_DEV_HOST_PORT:-8000}:8000"

  celery-worker:
    build:
      context: ../apps/backend
      target: dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      DJANGO_DEBUG: "true"
    # Celery has no autoreload: after changing task code, restart the worker
    # (docker compose restart celery-worker) — still no image rebuild.
    volumes: *dev-source

  celery-beat:
    build:
      context: ../apps/backend
      target: dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      DJANGO_DEBUG: "true"
    volumes: *dev-source

  spicedb-schema:
    # This command also validates per-user OAuth settings. Match the host user
    # in development so mode-0600 bind-mounted secrets remain readable without
    # weakening their permissions.
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      # This one-off Django command loads the same settings as the app. It must
      # be recognized as development when the local OAuth workaround is active.
      DJANGO_DEBUG: "true"

  # Publish infra ports on localhost for DEVELOPMENT only. In production/deploy
  # these stay unpublished (only the proxy binds host ports), so multiple client
  # stacks can coexist on one host without colliding.
  traefik:
    ports:
      - "127.0.0.1:${TRAEFIK_DASHBOARD_HOST_PORT:-8088}:8080"
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
  redis:
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
  neo4j:
    ports:
      - "127.0.0.1:${NEO4J_HTTP_HOST_PORT:-17474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_HOST_PORT:-17687}:7687"
  spicedb:
    ports:
      - "127.0.0.1:${SPICEDB_GRPC_HOST_PORT:-15051}:50051"
      - "127.0.0.1:${SPICEDB_HTTP_HOST_PORT:-18443}:8443"
  open-webui:
    ports:
      - "127.0.0.1:${OPEN_WEBUI_PORT:-3000}:8080"
  dozzle:
    ports:
      - "127.0.0.1:${DOZZLE_HOST_PORT:-9999}:8080"
