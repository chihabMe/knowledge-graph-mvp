name: knowledge-graph-infra

# Shared per-service defaults. Docker's default json-file driver grows
# without bound — a chatty container fills the host disk. Memory limits stop
# one runaway service from triggering the kernel OOM killer against its
# neighbours; raise a service's limit deliberately, not by removing it.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.dashboard=true
    ports:
      - "80:80"
      - "443:443"
      # Dashboard has no auth of its own — never publish it beyond localhost.
      - "127.0.0.1:${TRAEFIK_DASHBOARD_HOST_PORT:-8088}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - kg-public

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_graph}
      POSTGRES_USER: ${POSTGRES_USER:-kg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kg-private

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redis-data:/data
    networks:
      - kg-private

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          # Heap (1G default) + page cache + JVM overhead; keep ~2x heap.
          memory: ${NEO4J_MEMORY_LIMIT:-2G}
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change-this-neo4j-password}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
    ports:
      - "127.0.0.1:${NEO4J_HTTP_HOST_PORT:-17474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_HOST_PORT:-17687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - kg-private

  spicedb:
    image: ghcr.io/authzed/spicedb:v1.51.1
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
    command:
      - --skip-release-check
      - serve
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${SPICEDB_GRPC_PRESHARED_KEY:-change-this-spicedb-key}
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: postgres://${POSTGRES_USER:-kg_user}:${POSTGRES_PASSWORD:-change-this-postgres-password}@postgres:5432/${POSTGRES_DB:-knowledge_graph}?sslmode=disable
    # Exec form only: the SpiceDB image ships no shell, but includes
    # grpc_health_probe (verified against the running image).
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "127.0.0.1:${SPICEDB_GRPC_HOST_PORT:-15051}:50051"
      - "127.0.0.1:${SPICEDB_HTTP_HOST_PORT:-18443}:8443"
    networks:
      - kg-private

  spicedb-migrate:
    image: ghcr.io/authzed/spicedb:v1.51.1
    restart: "no"
    logging: *default-logging
    command:
      - --skip-release-check
      - datastore
      - migrate
      - head
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: postgres://${POSTGRES_USER:-kg_user}:${POSTGRES_PASSWORD:-change-this-postgres-password}@postgres:5432/${POSTGRES_DB:-knowledge_graph}?sslmode=disable
    networks:
      - kg-private

  open-webui:
    # Pinned: "main" is whatever was pushed last and can break on any pull.
    image: ghcr.io/open-webui/open-webui:0.10.2
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-this-webui-secret}
      # Environment values are authoritative so a stale value in the named
      # volume cannot silently re-enable a provider, signup, or direct access.
      ENABLE_PERSISTENT_CONFIG: "false"
      ENABLE_OAUTH_PERSISTENT_CONFIG: "false"
      WEBUI_URL: ${WEBUI_URL:-http://localhost:3000}
      CORS_ALLOW_ORIGIN: ${WEBUI_URL:-http://localhost:3000}
      SAFE_MODE: "true"
      # Expose only the Django-owned logical model. OpenRouter remains private
      # behind answer_query(); Open WebUI never receives its provider key.
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: http://django:8000/v1
      OPENAI_API_KEY: ${OPEN_WEBUI_BACKEND_API_KEY:-change-this-open-webui-backend-api-key}
      OPENAI_API_CONFIGS: '{"0":{"enable":true,"model_ids":["${OPEN_WEBUI_MODEL_ID:-client-knowledge-graph}"]}}'
      DEFAULT_MODELS: ${OPEN_WEBUI_MODEL_ID:-client-knowledge-graph}
      DEFAULT_PINNED_MODELS: ${OPEN_WEBUI_MODEL_ID:-client-knowledge-graph}
      ENABLE_EVALUATION_ARENA_MODELS: "false"
      # This deployment exposes exactly one Django-owned logical model. Allow
      # every authenticated tenant user to discover it automatically; Django
      # still verifies the signed identity and enforces document authorization.
      BYPASS_MODEL_ACCESS_CONTROL: ${OPEN_WEBUI_BYPASS_MODEL_ACCESS_CONTROL:-true}
      ENABLE_DIRECT_CONNECTIONS: "false"
      ENABLE_OPENAI_API_PASSTHROUGH: "false"
      # The bearer key identifies this service; this independent short-lived
      # JWT identifies the authenticated user on each chat request.
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
      FORWARD_USER_INFO_HEADER_JWT_SECRET: ${OPEN_WEBUI_IDENTITY_JWT_SECRET:-change-this-open-webui-identity-jwt-secret}
      FORWARD_USER_INFO_HEADER_JWT: ${OPEN_WEBUI_IDENTITY_JWT_HEADER:-X-OpenWebUI-User-Jwt}
      FORWARD_USER_INFO_HEADER_JWT_EXPIRES_SECONDS: ${OPEN_WEBUI_IDENTITY_JWT_MAX_LIFETIME_SECONDS:-300}
      # Google performs interactive login. Local password recovery is an
      # explicit, temporary operator override and is disabled by default.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      OPENID_PROVIDER_URL: https://accounts.google.com/.well-known/openid-configuration
      ENABLE_OAUTH_SIGNUP: "true"
      # Keep automatic model discovery tenant-scoped by admitting OAuth users
      # only from the same domain accepted by the Django Drive flow.
      OAUTH_ALLOWED_DOMAINS: ${GOOGLE_USER_OAUTH_ALLOWED_DOMAIN:-example.com}
      ENABLE_OAUTH_ID_TOKEN_COOKIE: "false"
      OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "false"
      ENABLE_PROFILE_IMAGE_URL_FORWARDING: "false"
      ENABLE_SIGNUP: "false"
      ENABLE_LOGIN_FORM: ${OPEN_WEBUI_ENABLE_LOGIN_FORM:-false}
      ENABLE_PASSWORD_AUTH: ${OPEN_WEBUI_ENABLE_PASSWORD_AUTH:-false}
      ENABLE_PASSWORD_CHANGE_FORM: ${OPEN_WEBUI_ENABLE_PASSWORD_CHANGE_FORM:-false}
      # Auxiliary model calls would turn chat history into new queries. The
      # knowledge-graph adapter accepts only explicit user questions.
      ENABLE_TITLE_GENERATION: "false"
      ENABLE_FOLLOW_UP_GENERATION: "false"
      ENABLE_TAGS_GENERATION: "false"
      ENABLE_AUTOCOMPLETE_GENERATION: "false"
      ENABLE_SEARCH_QUERY_GENERATION: "false"
      # Open WebUI is only the chat shell. Its own file/RAG/tool surfaces are
      # not another retrieval path and must not download or query local models.
      RAG_EMBEDDING_ENGINE: openai
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
      BYPASS_EMBEDDING_AND_RETRIEVAL: "true"
      ENABLE_RAG_LOCAL_WEB_FETCH: "false"
      USER_PERMISSIONS_CHAT_CONTROLS: "false"
      USER_PERMISSIONS_CHAT_SYSTEM_PROMPT: "false"
      USER_PERMISSIONS_CHAT_PARAMS: "false"
      USER_PERMISSIONS_CHAT_FILE_UPLOAD: "false"
      USER_PERMISSIONS_CHAT_WEB_UPLOAD: "false"
      USER_PERMISSIONS_CHAT_MULTIPLE_MODELS: "false"
      USER_PERMISSIONS_FEATURES_DIRECT_TOOL_SERVERS: "false"
      USER_PERMISSIONS_FEATURES_WEB_SEARCH: "false"
      USER_PERMISSIONS_FEATURES_IMAGE_GENERATION: "false"
      USER_PERMISSIONS_FEATURES_CODE_INTERPRETER: "false"
      USER_PERMISSIONS_FEATURES_MEMORIES: "false"
    # Public access goes through Traefik; the direct port is local-dev only.
    ports:
      - "127.0.0.1:${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - kg-public
      - kg-private
    labels:
      - traefik.enable=true
      - traefik.http.routers.open-webui.rule=Host(`${OPEN_WEBUI_HOST:-ai.localhost}`)
      - traefik.http.routers.open-webui.entrypoints=web
      - traefik.http.services.open-webui.loadbalancer.server.port=8080

  dozzle:
    image: amir20/dozzle:v10.6.7
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # The direct port bypasses the ops-auth middleware below (it exposes every
    # container's logs), so it must stay bound to localhost. Remote access
    # goes through Traefik, which enforces basicauth.
    ports:
      - "127.0.0.1:${DOZZLE_HOST_PORT:-9999}:8080"
    networks:
      - kg-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.dozzle.rule=Host(`${DOZZLE_HOST:-logs.localhost}`)
      - traefik.http.routers.dozzle.entrypoints=web
      - traefik.http.routers.dozzle.middlewares=ops-auth
      - traefik.http.middlewares.ops-auth.basicauth.users=${TRAEFIK_OPS_BASIC_AUTH_USERS:-admin:$$apr1$$H6uskkkW$$IgXLP6ewTrSuBkTrqE8wj/}
      - traefik.http.services.dozzle.loadbalancer.server.port=8080

networks:
  kg-public:
    name: kg-public
  kg-egress:
    name: kg-egress
  kg-private:
    name: kg-private
    internal: true

volumes:
  traefik-letsencrypt:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  open-webui-data:
